name: Link check

on:
  pull_request:
    paths:
      - 'docs/usage/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'Edict/Edict.*/README.md'
      - '.github/workflows/link-check.yml'
      - '.github/lychee.toml'
  push:
    branches:
      - main
    paths:
      - 'docs/usage/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'Edict/Edict.*/README.md'
      - '.github/workflows/link-check.yml'
      - '.github/lychee.toml'

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lychee link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .github/lychee.toml
            --no-progress
            README.md
            AGENTS.md
            'docs/usage/**/*.md'
            'Edict/Edict.*/README.md'
          fail: true
